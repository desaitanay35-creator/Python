<!DOCTYPE html>
<html>
<head>
{% block titel %}
    <title>Navbar Example</title>
{% endblock titel %}
<style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .navbar {
            background-color: #333;
            overflow: hidden;
        }

        .navbar a {
            float: left;
            color: white;
            text-align: center;
            padding: 14px 20px;
            text-decoration: none;
        }

        .navbar a:hover {
            background-color: #ddd;
            color: black;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="{% url 'home1' %}">Home</a>
        <a href="{% url 'about1' %}">About</a>
    </div>
    {% block body %}
    
    {% endblock body %}



</body>
</html>
