{% extends 'navebar.html' %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    {% block body %}
        <h1>Edit Details</h1>
        <form method="post">
            {% csrf_token %}
            name : <input type="text" name='name' value={{play.name}}>
            test_innings : <input type="text" name='test_innings' value={{play.test_innings}}>
            runs : <input type="text" name='runs' value={{play.test_innings}}>
            <input type="submit" value="Edit">
        </form>
    {% endblock body %}
</body>
</html>
